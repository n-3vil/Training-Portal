<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Portal</title>
<style>
  :root {
    /* SOTI brand palette (from SOTI 2026 presentation template) */
    --bg: #f4f7fc;
    --card: #ffffff;
    --ink: #292929;
    --muted: #7c7d81;
    --accent: #387FE3;
    --accent-dark: #2872E5;
    --accent-light: #32B6E9;
    --accent-soft: #e3edfc;
    --green: #2C9446;
    --green-soft: #e4f3e0;
    --amber: #F36B22;
    --amber-soft: #fdeadd;
    --red: #E32822;
    --red-soft: #fce3e2;
    --border: #e2e8f0;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI Semilight", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.55;
  }
  header {
    background: linear-gradient(135deg, var(--accent-dark), var(--accent) 55%, var(--accent-light));
    color: #fff; padding: 24px 20px;
  }
  .wrap { max-width: 860px; margin: 0 auto; padding: 0 4px; }
  .brand-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .brand-row svg { height: 30px; width: auto; flex-shrink: 0; }
  .brand-sep { width: 1px; height: 34px; background: rgba(255,255,255,.4); }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header .sub { opacity: .85; font-size: .92rem; margin-top: 6px; }
  .spacer { flex: 1; }
  .btn {
    display: inline-block; border: none; border-radius: 8px; padding: 9px 16px;
    font-size: .92rem; font-weight: 600; cursor: pointer;
    background: var(--accent); color: #fff;
  }
  .btn:hover { background: var(--accent-dark); }
  .btn-ghost { background: rgba(255,255,255,.18); color: #fff; border: 1px solid rgba(255,255,255,.5); }
  .btn-ghost:hover { background: rgba(255,255,255,.3); }
  .btn-danger { background: var(--red-soft); color: var(--red); }
  .btn-danger:hover { background: #f8cfcd; }
  .btn-small { padding: 5px 12px; font-size: .82rem; }
  nav {
    background: var(--card); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 5;
  }
  nav .wrap { display: flex; gap: 4px; overflow-x: auto; }
  nav button {
    background: none; border: none; padding: 14px 16px; font-size: .95rem; white-space: nowrap;
    cursor: pointer; color: var(--muted); border-bottom: 3px solid transparent; font-weight: 600;
  }
  nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
  main { padding: 24px 20px 60px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; margin-bottom: 14px;
  }
  .card h3 { font-size: 1.05rem; margin-bottom: 6px; }
  .meta { font-size: .85rem; color: var(--muted); margin-bottom: 8px; display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: .78rem; font-weight: 600; }
  .b-blue { background: var(--accent-soft); color: var(--accent); }
  .b-green { background: var(--green-soft); color: var(--green); }
  .b-amber { background: var(--amber-soft); color: var(--amber); }
  .b-red { background: var(--red-soft); color: var(--red); }
  .b-gray { background: #f1f5f9; color: var(--muted); }
  ul.topics { margin: 8px 0 0 20px; }
  ul.topics li { margin-bottom: 4px; }
  .resources { margin-top: 10px; font-size: .9rem; }
  .resources a { color: var(--accent); text-decoration: none; margin-right: 14px; }
  .resources a:hover { text-decoration: underline; }
  .progress-outer { background: #e2e8f0; border-radius: 999px; height: 10px; overflow: hidden; margin-top: 8px; }
  .progress-inner { background: var(--green); height: 100%; transition: width .4s; }
  .feedback {
    background: #f8fafc; border-left: 3px solid var(--accent);
    padding: 10px 14px; border-radius: 0 8px 8px 0; margin-top: 10px; font-size: .92rem;
  }
  .feedback strong { color: var(--accent); }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }
  .section-title { font-size: 1.2rem; margin: 6px 0 16px; }
  .summary-card { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat .num { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
  .stat .lbl { font-size: .82rem; color: var(--muted); }
  footer { text-align: center; color: var(--muted); font-size: .8rem; padding: 20px; }

  /* Login */
  .login-box { max-width: 420px; margin: 60px auto; }
  .login-box .card { padding: 28px; }
  .login-box h2 { margin-bottom: 4px; }
  .login-box p { color: var(--muted); font-size: .92rem; margin-bottom: 16px; }
  input[type=text], input[type=password], input[type=date], select, textarea {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: .95rem; font-family: inherit; background: #fff; color: var(--ink);
  }
  textarea { resize: vertical; min-height: 54px; }
  .login-err { color: var(--red); font-size: .88rem; margin-top: 10px; display: none; }

  /* Admin */
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: .82rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full { grid-column: 1 / -1; }
  .eval-row {
    display: grid; grid-template-columns: 110px 130px 90px 1fr; gap: 8px; align-items: center;
    padding: 8px 0; border-top: 1px solid var(--border); font-size: .9rem;
  }
  .eval-row:first-of-type { border-top: none; }
  .row-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
  .chip-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip-row label { display: flex; gap: 5px; align-items: center; font-size: .88rem; font-weight: 400; color: var(--ink); }
  .savebar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: var(--ink); color: #fff; padding: 12px 20px; display: none;
  }
  .savebar .wrap { display: flex; align-items: center; gap: 14px; }
  .savebar.show { display: block; }
  details.adder { margin-bottom: 16px; }
  details.adder summary {
    cursor: pointer; font-weight: 600; color: var(--accent);
    padding: 12px 16px; background: var(--accent-soft); border-radius: var(--radius);
    list-style: none;
  }
  details.adder[open] summary { border-radius: var(--radius) var(--radius) 0 0; }
  details.adder .card { border-radius: 0 0 var(--radius) var(--radius); border-top: none; }
  #toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 20px; border-radius: 999px;
    font-size: .9rem; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 30;
  }
  #toast.show { opacity: 1; }
  .warn-card { background: var(--amber-soft); border-color: #f5cdae; font-size: .9rem; }
  code { background: #f1f5f9; padding: 1px 6px; border-radius: 5px; font-size: .88em; }
  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr; }
    .eval-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="brand-row">
      <!-- SOTI wordmark -->
      <svg viewBox="0 0 229.6 54.48" xmlns="http://www.w3.org/2000/svg" aria-label="SOTI" role="img"><g fill="#FFFFFF"><path d="M131 8.27C128.56 5.36 126.34 3.96 123.08 2.68 119.7 1.4 113.88 0 103.87 0 93.86 0 87.92 1.28 84.55 2.68 81.17 3.96 79.08 5.36 76.63 8.27 74.07 11.3 71.39 16.88 71.39 27.36 71.39 37.84 74.42 43.66 77.09 46.45 78.6 48.08 81.75 50.29 84.42 51.46 88.03 52.86 94.08 54.37 103.86 54.37 113.64 54.37 119.69 52.86 123.3 51.46 125.98 50.41 129.12 48.2 130.63 46.45 133.19 43.66 136.33 38.3 136.33 27.36 136.21 16.88 133.42 11.3 130.98 8.27ZM120.75 42.26C117.84 45.17 112.95 46.8 103.87 46.8 94.79 46.8 89.9 45.05 86.99 42.26 82.68 38.07 82.33 29.8 82.33 27.13 82.33 19.8 83.84 15.02 86.17 12.23 89.08 8.74 93.15 7.46 103.86 7.46 114.57 7.46 118.64 8.86 121.55 12.23 123.99 15.02 125.39 19.8 125.39 27.13 125.27 29.92 124.92 38.07 120.73 42.26Z"/><path d="M179.54 51.45C179.54 52.5 178.84 52.96 177.79 52.96L171.04 52.96C169.99 52.96 169.41 52.49 169.41 51.45L169.41 8.73C169.41 8.38 169.29 8.15 168.83 8.15L146.48 8.15C145.08 8.15 144.5 7.57 144.5 6.29L144.5 3.03C144.5 1.63 145.08 1.05 146.36 1.05L202.12 1.05C203.52 1.05 203.98 1.63 203.98 3.03L203.98 6.29C203.98 7.69 203.4 8.15 202.12 8.15L180 8.15C179.65 8.15 179.42 8.27 179.42 8.73L179.42 51.45 179.54 51.45Z"/><path d="M219.7 51.45C219.7 52.61 220.28 53.31 221.45 53.31L227.85 53.31C229.01 53.31 229.6 52.73 229.6 51.45L229.6 2.91C229.6 1.75 229.02 1.05 227.85 1.05L221.45 1.05C220.29 1.05 219.7 1.63 219.7 2.91L219.7 51.45Z"/><path d="M53.12 48.66C56.61 45.52 57.31 41.21 57.31 37.83 57.31 34.1 56.03 30.5 53.58 28.17 51.37 25.96 48.69 24.33 42.06 23.28 32.98 21.88 19.01 20.37 16.57 19.67 13.43 18.86 11.22 17.57 10.98 14.43 10.98 14.08 11.1 13.73 11.21 13.27 11.68 11.52 12.84 9.66 16.33 8.61 19.36 7.68 23.31 7.33 29.48 7.33 36.58 7.33 41.24 7.68 50.32 9.08 51.6 9.31 51.72 8.15 51.83 7.45 52.06 6.64 52.18 5.12 52.3 4.31 52.42 2.8 52.18 2.45 51.02 2.1 48.92 1.52 39.5 0 28.67 0 13.31 0 7.83 2.44 5.62 3.96 2.71 5.82 0.73 8.73 0.15 12.81-0.2 15.6 0.03 18.28 1.08 20.49 2.24 23.05 3.99 25.15 9.46 27.36 15.86 29.92 36.47 31.55 39.73 32.25 45.08 33.53 45.9 35.86 46.13 38.3 46.25 39.46 46.36 42.03 43.1 44.12 39.37 46.45 31.23 47.15 27.5 47.03 27.5 47.03 20.86 47.03 14.35 46.33 7.95 45.63 3.76 45.05 2.94 45.05 1.89 45.05 1.43 45.4 1.19 46.8 1.07 47.61 0.96 48.66 0.84 49.83 0.72 51.69 1.07 52.16 3.87 52.62 9.81 53.67 18.89 54.48 26.92 54.48L26.92 54.48C31.81 54.25 46.71 54.36 53.11 48.66Z"/></g></svg>
      <div class="brand-sep"></div>
      <h1 id="cohort-name">Training Portal</h1>
      <div class="spacer"></div>
      <button class="btn btn-ghost" id="logout-btn" style="display:none">Log out</button>
    </div>
    <p class="sub" id="header-sub"></p>
  </div>
</header>

<nav id="tabs" style="display:none"><div class="wrap"></div></nav>

<main class="wrap">
  <div id="content"><p class="empty">Loading…</p></div>
</main>

<div class="savebar" id="savebar">
  <div class="wrap">
    <span id="savebar-msg">You have unsaved changes.</span>
    <div class="spacer"></div>
    <button class="btn" id="save-btn">Save to GitHub</button>
    <button class="btn btn-ghost" id="discard-btn">Discard</button>
  </div>
</div>

<div id="toast"></div>
<footer>SOTI Training Portal — refresh the page to see the latest content.</footer>

<script>
(function () {
  "use strict";

  /* ---------- state ---------- */
  let data = {};            // { students, plan, homework, tasks }
  const shas = {};          // GitHub blob shas per file (admin mode)
  const dirty = new Set();  // files with unsaved changes
  let session = null;       // { role: "student", student } | { role: "admin" }
  let tab = "overview";

  const FILES = {
    students: "data/students.json",
    plan: "data/plan.json",
    homework: "data/homework.json",
    tasks: "data/tasks.json"
  };

  /* ---------- helpers ---------- */
  const $ = id => document.getElementById(id);
  const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const today = new Date().toISOString().slice(0, 10);
  const fmtDate = d => d ? new Date(d + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "";
  const slug = s => s.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "").slice(0, 30) || ("x" + Date.now());
  function toast(msg) {
    $("toast").textContent = msg;
    $("toast").classList.add("show");
    setTimeout(() => $("toast").classList.remove("show"), 2600);
  }
  function b64encode(str) { return btoa(unescape(encodeURIComponent(str))); }
  function b64decode(str) { return decodeURIComponent(escape(atob(str.replace(/\n/g, "")))); }

  function dueBadge(due, done) {
    if (!due) return "";
    if (done) return `<span class="badge b-gray">Due ${fmtDate(due)}</span>`;
    return due < today
      ? `<span class="badge b-red">Overdue — was due ${fmtDate(due)}</span>`
      : `<span class="badge b-blue">Due ${fmtDate(due)}</span>`;
  }
  function hwStatus(ev) {
    if (!ev || !ev.status || ev.status === "pending") return { label: "Not submitted", cls: "b-amber", done: false };
    if (ev.status === "submitted") return { label: "Submitted — awaiting review", cls: "b-blue", done: true };
    if (ev.status === "graded") return { label: "Graded" + (ev.grade ? ": " + ev.grade : ""), cls: "b-green", done: true };
    return { label: ev.status, cls: "b-gray", done: false };
  }

  /* ---------- GitHub API (admin) ---------- */
  const repoCfg = () => data.students && data.students.repo;
  const getToken = () => localStorage.getItem("gh_token") || "";
  function apiUrl(path) {
    const r = repoCfg();
    return `https://api.github.com/repos/${r.owner}/${r.name}/contents/${path}?ref=${r.branch}`;
  }
  async function ghFetchFile(path) {
    const res = await fetch(apiUrl(path), {
      headers: { Accept: "application/vnd.github+json", Authorization: "Bearer " + getToken() }
    });
    if (!res.ok) throw new Error(`GitHub API ${res.status} for ${path}`);
    const j = await res.json();
    return { obj: JSON.parse(b64decode(j.content)), sha: j.sha };
  }
  async function ghSaveFile(path, obj, sha, message) {
    const r = repoCfg();
    const res = await fetch(`https://api.github.com/repos/${r.owner}/${r.name}/contents/${path}`, {
      method: "PUT",
      headers: { Accept: "application/vnd.github+json", Authorization: "Bearer " + getToken(), "Content-Type": "application/json" },
      body: JSON.stringify({ message, branch: r.branch, sha, content: b64encode(JSON.stringify(obj, null, 2) + "\n") })
    });
    if (!res.ok) {
      const j = await res.json().catch(() => ({}));
      throw new Error(`Save failed (${res.status}): ${j.message || "unknown error"}`);
    }
    return (await res.json()).content.sha;
  }

  /* ---------- data loading ---------- */
  async function loadPublic() {
    const bust = "?v=" + Date.now();
    const [students, plan, homework, tasks] = await Promise.all(
      Object.values(FILES).map(f => fetch(f + bust).then(r => { if (!r.ok) throw new Error(f); return r.json(); }))
    );
    data = { students, plan, homework, tasks };
  }
  async function loadViaApi() {
    for (const [key, path] of Object.entries(FILES)) {
      const { obj, sha } = await ghFetchFile(path);
      data[key] = obj; shas[path] = sha;
    }
  }

  /* ---------- session ---------- */
  function saveSession() {
    sessionStorage.setItem("tp_session", JSON.stringify(
      session.role === "admin" ? { role: "admin" } : { role: "student", id: session.student.id }
    ));
  }
  function restoreSession() {
    try {
      const s = JSON.parse(sessionStorage.getItem("tp_session"));
      if (!s) return;
      if (s.role === "admin") session = { role: "admin" };
      else {
        const st = data.students.students.find(x => x.id === s.id);
        if (st) session = { role: "student", student: st };
      }
    } catch (e) { /* ignore */ }
  }
  function logout() {
    session = null;
    sessionStorage.removeItem("tp_session");
    dirty.clear(); updateSavebar();
    tab = "overview";
    renderShell();
  }

  /* ---------- shell / navigation ---------- */
  const STUDENT_TABS = [["overview", "Overview"], ["plan", "Training Plan"], ["homework", "Homework"], ["tasks", "Tasks"]];
  const ADMIN_TABS = [["a-students", "Students"], ["a-homework", "Homework"], ["a-tasks", "Tasks"], ["a-plan", "Training Plan"], ["a-settings", "Settings"]];

  function renderShell() {
    $("cohort-name").textContent = data.students.cohortName || "Training Portal";
    document.title = data.students.cohortName || "Training Portal";
    const nav = $("tabs");
    if (!session) {
      nav.style.display = "none";
      $("logout-btn").style.display = "none";
      $("header-sub").textContent = data.students.instructor ? "Instructor: " + data.students.instructor : "";
      renderLogin();
      return;
    }
    $("logout-btn").style.display = "";
    const tabsDef = session.role === "admin" ? ADMIN_TABS : STUDENT_TABS;
    if (!tabsDef.some(t => t[0] === tab)) tab = tabsDef[0][0];
    $("header-sub").textContent = session.role === "admin"
      ? "Admin mode — signed in as instructor"
      : "Signed in as " + session.student.name;
    nav.style.display = "";
    nav.querySelector(".wrap").innerHTML = tabsDef.map(([id, label]) =>
      `<button data-tab="${id}" class="${id === tab ? "active" : ""}">${label}</button>`).join("");
    nav.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
      tab = b.dataset.tab;
      nav.querySelectorAll("button").forEach(x => x.classList.toggle("active", x === b));
      render();
    }));
    render();
  }

  function render() {
    const views = {
      overview: renderOverview, plan: renderPlan, homework: renderHomework, tasks: renderTasks,
      "a-students": renderAdminStudents, "a-homework": renderAdminHomework,
      "a-tasks": renderAdminTasks, "a-plan": renderAdminPlan, "a-settings": renderAdminSettings
    };
    $("content").innerHTML = views[tab]();
    wireEvents();
  }

  /* ---------- login ---------- */
  function renderLogin() {
    $("content").innerHTML = `
      <div class="login-box">
        <div class="card">
          <h2>Sign in</h2>
          <p>Enter the access code you received from your instructor.</p>
          <div class="field"><input type="password" id="login-code" placeholder="Access code" autocomplete="off"></div>
          <button class="btn" id="login-btn" style="width:100%">Sign in</button>
          <div class="login-err" id="login-err">Code not recognized. Check with your instructor.</div>
        </div>
      </div>`;
    const attempt = () => {
      const code = $("login-code").value.trim();
      if (!code) return;
      if (data.students.adminCode && code === data.students.adminCode) {
        session = { role: "admin" }; saveSession();
        enterAdmin();
        return;
      }
      const st = data.students.students.find(s => (s.code || "") === code);
      if (st) { session = { role: "student", student: st }; saveSession(); renderShell(); }
      else $("login-err").style.display = "block";
    };
    $("login-btn").addEventListener("click", attempt);
    $("login-code").addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
    $("login-code").focus();
  }

  async function enterAdmin() {
    renderShell();
    if (getToken() && repoCfg()) {
      try { await loadViaApi(); toast("Loaded latest data from GitHub"); render(); }
      catch (e) { toast("Could not load via GitHub API — check your token in Settings"); }
    }
  }

  /* ---------- student views ---------- */
  const assignedTo = (a, id) => a.assignedTo.includes("all") || a.assignedTo.includes(id);

  function renderOverview() {
    const s = session.student;
    const completed = s.completedModules || [];
    const myHw = data.homework.homework.filter(h => assignedTo(h, s.id));
    const gradedCount = myHw.filter(h => (h.evaluations[s.id] || {}).status === "graded").length;
    const myTasks = data.tasks.tasks.filter(t => assignedTo(t, s.id));
    const openTasks = myTasks.filter(t => (t.status[s.id] || "not-started") !== "done").length;
    const pct = data.plan.modules.length ? Math.round(completed.length / data.plan.modules.length * 100) : 0;
    let recent = "";
    myHw.forEach(h => {
      const ev = h.evaluations[s.id];
      if (ev && ev.status === "graded") {
        recent += `<div class="feedback"><strong>${esc(h.title)}</strong> — ${esc(ev.grade || "graded")}
          ${ev.feedback ? "<br>" + esc(ev.feedback) : ""}</div>`;
      }
    });
    return `
      <h2 class="section-title">Welcome, ${esc(s.name.split(" ")[0])}</h2>
      <div class="card summary-card">
        <div class="stat"><div class="num">${pct}%</div><div class="lbl">Plan completed</div></div>
        <div class="stat"><div class="num">${gradedCount}/${myHw.length}</div><div class="lbl">Homework graded</div></div>
        <div class="stat"><div class="num">${openTasks}</div><div class="lbl">Open tasks</div></div>
      </div>
      <div class="card">
        <h3>Training progress</h3>
        <div class="meta">${completed.length} of ${data.plan.modules.length} modules completed</div>
        <div class="progress-outer"><div class="progress-inner" style="width:${pct}%"></div></div>
      </div>
      ${recent ? `<div class="card"><h3>Latest feedback</h3>${recent}</div>` : ""}`;
  }

  function renderPlan() {
    const completed = session.student.completedModules || [];
    return `<h2 class="section-title">${esc(data.plan.title || "Training Plan")}</h2>` +
      data.plan.modules.map(m => `<div class="card">
        <h3>Week ${m.week}: ${esc(m.title)}
          ${completed.includes(m.id) ? '<span class="badge b-green">Completed</span>' : '<span class="badge b-gray">Not completed</span>'}
        </h3>
        <ul class="topics">${m.topics.map(t => `<li>${esc(t)}</li>`).join("")}</ul>
        ${m.resources && m.resources.length ? `<div class="resources">${m.resources.map(r =>
          `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.label)} ↗</a>`).join("")}</div>` : ""}
      </div>`).join("");
  }

  function renderHomework() {
    const s = session.student;
    const mine = data.homework.homework.filter(h => assignedTo(h, s.id));
    if (!mine.length) return '<p class="empty">No homework assigned yet.</p>';
    return `<h2 class="section-title">Homework</h2>` + mine.map(h => {
      const ev = h.evaluations[s.id];
      const st = hwStatus(ev);
      return `<div class="card">
        <h3>${esc(h.title)}</h3>
        <div class="meta"><span class="badge ${st.cls}">${esc(st.label)}</span>${dueBadge(h.due, st.done)}</div>
        <p>${esc(h.description)}</p>
        ${h.submitVia ? `<p class="meta" style="margin-top:8px">How to submit: ${esc(h.submitVia)}</p>` : ""}
        ${ev && ev.feedback ? `<div class="feedback"><strong>Instructor feedback:</strong> ${esc(ev.feedback)}</div>` : ""}
      </div>`;
    }).join("");
  }

  function renderTasks() {
    const s = session.student;
    const mine = data.tasks.tasks.filter(t => assignedTo(t, s.id));
    if (!mine.length) return '<p class="empty">No tasks assigned yet.</p>';
    const badge = { "done": ["Done", "b-green"], "in-progress": ["In progress", "b-blue"], "not-started": ["Not started", "b-amber"] };
    return `<h2 class="section-title">Tasks</h2>` + mine.map(t => {
      const st = t.status[s.id] || "not-started";
      const [lbl, cls] = badge[st] || [st, "b-gray"];
      return `<div class="card">
        <h3>${esc(t.title)}</h3>
        <div class="meta"><span class="badge ${cls}">${lbl}</span>${dueBadge(t.due, st === "done")}</div>
        <p>${esc(t.description)}</p>
      </div>`;
    }).join("");
  }

  /* ---------- admin: shared ---------- */
  function markDirty(fileKey) {
    dirty.add(FILES[fileKey]);
    updateSavebar();
  }
  function updateSavebar() {
    $("savebar").classList.toggle("show", dirty.size > 0);
    if (dirty.size) $("savebar-msg").textContent = `Unsaved changes in: ${[...dirty].map(f => f.replace("data/", "")).join(", ")}`;
  }
  async function saveAll() {
    if (!getToken()) { toast("Add your GitHub token in Settings first"); tab = "a-settings"; renderShell(); return; }
    $("save-btn").disabled = true;
    try {
      for (const path of [...dirty]) {
        const key = Object.keys(FILES).find(k => FILES[k] === path);
        if (!shas[path]) { const f = await ghFetchFile(path); shas[path] = f.sha; } // fetch sha if missing
        shas[path] = await ghSaveFile(path, data[key], shas[path], "Update " + path + " via Training Portal admin");
        dirty.delete(path);
      }
      updateSavebar();
      toast("Saved to GitHub — live site updates in ~1 minute");
    } catch (e) {
      toast(e.message);
    } finally {
      $("save-btn").disabled = false;
    }
  }
  const allStudents = () => data.students.students;
  const nameOf = id => (allStudents().find(s => s.id === id) || { name: id }).name;
  function assigneeChecks(prefix, checked) {
    return `<div class="chip-row">
      <label><input type="checkbox" data-role="${prefix}-assignee" value="all" ${checked.includes("all") ? "checked" : ""}> Everyone</label>
      ${allStudents().map(s => `<label><input type="checkbox" data-role="${prefix}-assignee" value="${esc(s.id)}" ${checked.includes(s.id) ? "checked" : ""}> ${esc(s.name)}</label>`).join("")}
    </div>`;
  }
  function readAssignees(container, prefix) {
    const boxes = [...container.querySelectorAll(`input[data-role="${prefix}-assignee"]:checked`)].map(b => b.value);
    return boxes.includes("all") ? ["all"] : boxes;
  }

  /* ---------- admin: students ---------- */
  function renderAdminStudents() {
    return `<h2 class="section-title">Students</h2>
      <details class="adder"><summary>+ Add a student</summary>
        <div class="card"><div class="form-grid">
          <div class="field"><label>Full name</label><input type="text" id="ns-name" placeholder="Maria Lopez"></div>
          <div class="field"><label>Track</label><input type="text" id="ns-track" placeholder="IT Support / QA"></div>
          <div class="field"><label>Start date</label><input type="date" id="ns-start" value="${today}"></div>
          <div class="field"><label>Access code</label><input type="text" id="ns-code" placeholder="e.g. MARIA-2026"></div>
        </div>
        <button class="btn" id="ns-add">Add student</button></div>
      </details>` +
      allStudents().map(s => {
        const done = s.completedModules || [];
        return `<div class="card" data-sid="${esc(s.id)}">
          <h3>${esc(s.name)} <span class="badge b-blue">${esc(s.track || "")}</span></h3>
          <div class="meta">Access code: <code>${esc(s.code || "— none —")}</code> · Started ${fmtDate(s.startDate)}</div>
          <div class="field"><label>Completed modules</label>
            <div class="chip-row">${data.plan.modules.map(m =>
              `<label><input type="checkbox" data-role="mod-check" data-sid="${esc(s.id)}" value="${esc(m.id)}" ${done.includes(m.id) ? "checked" : ""}> W${m.week}: ${esc(m.title)}</label>`).join("")}
            </div>
          </div>
          <div class="row-actions">
            <button class="btn btn-small" data-role="regen-code" data-sid="${esc(s.id)}">New access code</button>
            <button class="btn btn-small btn-danger" data-role="del-student" data-sid="${esc(s.id)}">Remove student</button>
          </div>
        </div>`;
      }).join("");
  }

  /* ---------- admin: homework ---------- */
  function renderAdminHomework() {
    const evalRows = h => {
      const targets = h.assignedTo.includes("all") ? allStudents().map(s => s.id) : h.assignedTo;
      if (!targets.length) return '<p class="meta">No students assigned.</p>';
      return targets.map(id => {
        const ev = h.evaluations[id] || {};
        return `<div class="eval-row">
          <strong>${esc(nameOf(id))}</strong>
          <select data-role="ev-status" data-hw="${esc(h.id)}" data-sid="${esc(id)}">
            ${["pending", "submitted", "graded"].map(v => `<option value="${v}" ${(ev.status || "pending") === v ? "selected" : ""}>${v}</option>`).join("")}
          </select>
          <input type="text" placeholder="Grade" value="${esc(ev.grade || "")}" data-role="ev-grade" data-hw="${esc(h.id)}" data-sid="${esc(id)}">
          <input type="text" placeholder="Feedback for the student" value="${esc(ev.feedback || "")}" data-role="ev-feedback" data-hw="${esc(h.id)}" data-sid="${esc(id)}">
        </div>`;
      }).join("");
    };
    return `<h2 class="section-title">Homework</h2>
      <details class="adder"><summary>+ Assign new homework</summary>
        <div class="card">
          <div class="form-grid">
            <div class="field full"><label>Title</label><input type="text" id="nh-title"></div>
            <div class="field full"><label>Description</label><textarea id="nh-desc"></textarea></div>
            <div class="field"><label>Due date</label><input type="date" id="nh-due"></div>
            <div class="field"><label>How to submit</label><input type="text" id="nh-submit" placeholder="Email it to me"></div>
            <div class="field full"><label>Assign to</label>${assigneeChecks("nh", ["all"])}</div>
          </div>
          <button class="btn" id="nh-add">Assign homework</button>
        </div>
      </details>` +
      (data.homework.homework.length ? data.homework.homework.map(h => `<div class="card">
        <h3>${esc(h.title)}</h3>
        <div class="meta">${dueBadge(h.due, false)}<span>Assigned to: ${h.assignedTo.includes("all") ? "everyone" : h.assignedTo.map(nameOf).map(esc).join(", ")}</span></div>
        <p>${esc(h.description)}</p>
        <div style="margin-top:12px">${evalRows(h)}</div>
        <div class="row-actions"><button class="btn btn-small btn-danger" data-role="del-hw" data-hw="${esc(h.id)}">Delete homework</button></div>
      </div>`).join("") : '<p class="empty">No homework yet.</p>');
  }

  /* ---------- admin: tasks ---------- */
  function renderAdminTasks() {
    const statusRows = t => {
      const targets = t.assignedTo.includes("all") ? allStudents().map(s => s.id) : t.assignedTo;
      return targets.map(id => `<div class="eval-row" style="grid-template-columns:110px 160px">
        <strong>${esc(nameOf(id))}</strong>
        <select data-role="task-status" data-task="${esc(t.id)}" data-sid="${esc(id)}">
          ${["not-started", "in-progress", "done"].map(v => `<option value="${v}" ${(t.status[id] || "not-started") === v ? "selected" : ""}>${v}</option>`).join("")}
        </select>
      </div>`).join("");
    };
    return `<h2 class="section-title">Tasks</h2>
      <details class="adder"><summary>+ Give a new task</summary>
        <div class="card">
          <div class="form-grid">
            <div class="field full"><label>Title</label><input type="text" id="nt-title"></div>
            <div class="field full"><label>Description</label><textarea id="nt-desc"></textarea></div>
            <div class="field"><label>Due date</label><input type="date" id="nt-due"></div>
            <div class="field full"><label>Assign to</label>${assigneeChecks("nt", ["all"])}</div>
          </div>
          <button class="btn" id="nt-add">Give task</button>
        </div>
      </details>` +
      (data.tasks.tasks.length ? data.tasks.tasks.map(t => `<div class="card">
        <h3>${esc(t.title)}</h3>
        <div class="meta">${dueBadge(t.due, false)}<span>Assigned to: ${t.assignedTo.includes("all") ? "everyone" : t.assignedTo.map(nameOf).map(esc).join(", ")}</span></div>
        <p>${esc(t.description)}</p>
        <div style="margin-top:12px">${statusRows(t)}</div>
        <div class="row-actions"><button class="btn btn-small btn-danger" data-role="del-task" data-task="${esc(t.id)}">Delete task</button></div>
      </div>`).join("") : '<p class="empty">No tasks yet.</p>');
  }

  /* ---------- admin: plan (read-only summary) ---------- */
  function renderAdminPlan() {
    return `<h2 class="section-title">Training Plan</h2>
      <div class="card warn-card">The plan structure (modules, topics, links) is edited in <code>data/plan.json</code> in your repo — open the file on github.com and use the pencil icon. Marking modules complete per student is done on the Students tab.</div>` +
      data.plan.modules.map(m => `<div class="card">
        <h3>Week ${m.week}: ${esc(m.title)}</h3>
        <ul class="topics">${m.topics.map(t => `<li>${esc(t)}</li>`).join("")}</ul>
      </div>`).join("");
  }

  /* ---------- admin: settings ---------- */
  function renderAdminSettings() {
    const r = repoCfg();
    return `<h2 class="section-title">Settings</h2>
      <div class="card">
        <h3>GitHub access token</h3>
        <p class="meta">Needed so the admin panel can save changes to your repo (${r ? esc(r.owner + "/" + r.name) : "not configured"}). Create a <strong>fine-grained personal access token</strong> at github.com → Settings → Developer settings → Personal access tokens, with access to only this repository and <strong>Contents: Read and write</strong> permission. The token is stored only in this browser.</p>
        <div class="field"><input type="password" id="set-token" placeholder="${getToken() ? "Token saved — enter a new one to replace" : "github_pat_…"}"></div>
        <div class="row-actions">
          <button class="btn" id="save-token">Save token</button>
          ${getToken() ? '<button class="btn btn-small btn-danger" id="clear-token">Forget token</button>' : ""}
          <button class="btn btn-small" id="test-token">Test connection</button>
        </div>
      </div>
      <div class="card">
        <h3>Access codes</h3>
        <p class="meta">Admin code and student codes live in <code>data/students.json</code>. Change the admin code there (field <code>adminCode</code>). Student codes can be regenerated on the Students tab.</p>
        <p class="meta">⚠ This is a public repository: codes and training data are visible to anyone who inspects the repo. Don't store personal or sensitive information.</p>
      </div>`;
  }

  /* ---------- event wiring (delegated per render) ---------- */
  function wireEvents() {
    const c = $("content");

    // students
    const nsAdd = $("ns-add");
    if (nsAdd) nsAdd.addEventListener("click", () => {
      const name = $("ns-name").value.trim();
      if (!name) { toast("Name is required"); return; }
      const id = slug(name);
      if (allStudents().some(s => s.id === id)) { toast("A student with a similar name already exists"); return; }
      allStudents().push({
        id, name,
        code: $("ns-code").value.trim() || (id.split("-")[0].toUpperCase() + "-" + Math.random().toString(36).slice(2, 6).toUpperCase()),
        track: $("ns-track").value.trim(),
        startDate: $("ns-start").value || today,
        completedModules: []
      });
      markDirty("students"); render(); toast("Student added — remember to Save");
    });
    c.querySelectorAll('[data-role="mod-check"]').forEach(el => el.addEventListener("change", () => {
      const s = allStudents().find(x => x.id === el.dataset.sid);
      const set = new Set(s.completedModules || []);
      el.checked ? set.add(el.value) : set.delete(el.value);
      s.completedModules = data.plan.modules.map(m => m.id).filter(id => set.has(id));
      markDirty("students");
    }));
    c.querySelectorAll('[data-role="regen-code"]').forEach(el => el.addEventListener("click", () => {
      const s = allStudents().find(x => x.id === el.dataset.sid);
      s.code = s.id.split("-")[0].toUpperCase() + "-" + Math.random().toString(36).slice(2, 6).toUpperCase();
      markDirty("students"); render(); toast("New code: " + s.code);
    }));
    c.querySelectorAll('[data-role="del-student"]').forEach(el => el.addEventListener("click", () => {
      const s = allStudents().find(x => x.id === el.dataset.sid);
      if (!confirm(`Remove ${s.name}? Their grades and task statuses stay in the files but they won't be able to sign in.`)) return;
      data.students.students = allStudents().filter(x => x.id !== s.id);
      markDirty("students"); render();
    }));

    // homework
    const nhAdd = $("nh-add");
    if (nhAdd) nhAdd.addEventListener("click", () => {
      const title = $("nh-title").value.trim();
      if (!title) { toast("Title is required"); return; }
      data.homework.homework.push({
        id: "hw-" + slug(title),
        title,
        assignedTo: readAssignees(c, "nh"),
        due: $("nh-due").value || "",
        description: $("nh-desc").value.trim(),
        submitVia: $("nh-submit").value.trim(),
        evaluations: {}
      });
      markDirty("homework"); render(); toast("Homework added — remember to Save");
    });
    const evUpdate = el => {
      const h = data.homework.homework.find(x => x.id === el.dataset.hw);
      const ev = h.evaluations[el.dataset.sid] || (h.evaluations[el.dataset.sid] = {});
      const field = el.dataset.role.replace("ev-", "");
      ev[field] = el.value.trim ? el.value.trim() : el.value;
      if (ev.status === "pending" && !ev.grade && !ev.feedback) delete h.evaluations[el.dataset.sid];
      markDirty("homework");
    };
    c.querySelectorAll('[data-role^="ev-"]').forEach(el => el.addEventListener("change", () => evUpdate(el)));
    c.querySelectorAll('[data-role="del-hw"]').forEach(el => el.addEventListener("click", () => {
      if (!confirm("Delete this homework and its grades?")) return;
      data.homework.homework = data.homework.homework.filter(x => x.id !== el.dataset.hw);
      markDirty("homework"); render();
    }));

    // tasks
    const ntAdd = $("nt-add");
    if (ntAdd) ntAdd.addEventListener("click", () => {
      const title = $("nt-title").value.trim();
      if (!title) { toast("Title is required"); return; }
      data.tasks.tasks.push({
        id: "t-" + slug(title),
        title,
        assignedTo: readAssignees(c, "nt"),
        due: $("nt-due").value || "",
        description: $("nt-desc").value.trim(),
        status: {}
      });
      markDirty("tasks"); render(); toast("Task added — remember to Save");
    });
    c.querySelectorAll('[data-role="task-status"]').forEach(el => el.addEventListener("change", () => {
      const t = data.tasks.tasks.find(x => x.id === el.dataset.task);
      t.status[el.dataset.sid] = el.value;
      markDirty("tasks");
    }));
    c.querySelectorAll('[data-role="del-task"]').forEach(el => el.addEventListener("click", () => {
      if (!confirm("Delete this task?")) return;
      data.tasks.tasks = data.tasks.tasks.filter(x => x.id !== el.dataset.task);
      markDirty("tasks"); render();
    }));

    // settings
    const saveTok = $("save-token");
    if (saveTok) saveTok.addEventListener("click", () => {
      const t = $("set-token").value.trim();
      if (!t) { toast("Paste a token first"); return; }
      localStorage.setItem("gh_token", t);
      toast("Token saved in this browser");
      enterAdmin();
    });
    const clearTok = $("clear-token");
    if (clearTok) clearTok.addEventListener("click", () => {
      localStorage.removeItem("gh_token"); render(); toast("Token forgotten");
    });
    const testTok = $("test-token");
    if (testTok) testTok.addEventListener("click", async () => {
      try { await ghFetchFile(FILES.students); toast("Connection OK — token works"); }
      catch (e) { toast("Connection failed: " + e.message); }
    });
  }

  /* ---------- boot ---------- */
  $("logout-btn").addEventListener("click", logout);
  $("save-btn").addEventListener("click", saveAll);
  $("discard-btn").addEventListener("click", async () => {
    dirty.clear(); updateSavebar();
    try { session && session.role === "admin" && getToken() ? await loadViaApi() : await loadPublic(); } catch (e) {}
    render(); toast("Changes discarded");
  });
  window.addEventListener("beforeunload", e => { if (dirty.size) { e.preventDefault(); e.returnValue = ""; } });

  (async function init() {
    try {
      await loadPublic();
    } catch (e) {
      $("content").innerHTML = '<p class="empty">Could not load data files. If you opened this file directly from disk, note it must be served over HTTP (GitHub Pages works).</p>';
      return;
    }
    restoreSession();
    if (session && session.role === "admin") enterAdmin(); else renderShell();
  })();
})();
</script>
</body>
</html>
