<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOTI Training Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef2f9; --card:#ffffff; --ink:#1a2233; --muted:#6b7280;
    --accent:#2872E5; --accent-dark:#1e5fc4; --accent-light:#32B6E9; --accent-soft:#e8f0fd;
    --green:#2C9446; --green-soft:#e3f4e6; --amber:#E06A1E; --amber-soft:#fdecdd;
    --red:#DA2A24; --red-soft:#fce4e3; --border:#e6eaf1; --radius:16px;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
    --shadow-lg:0 8px 30px rgba(16,24,40,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{font-family:"Segoe UI","Inter",system-ui,-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:920px;margin:0 auto;padding:0 8px}
  header{background:linear-gradient(120deg,#1e5fc4 0%,#2872E5 45%,#32B6E9 100%);color:#fff;padding:26px 20px 30px;box-shadow:0 6px 24px rgba(30,95,196,.28)}
  .brand-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand-row svg{height:30px;width:auto;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(0,0,0,.15))}
  .brand-sep{width:1px;height:32px;background:rgba(255,255,255,.45)}
  header h1{font-size:1.42rem;font-weight:700;letter-spacing:-.01em}
  header .sub{opacity:.9;font-size:.92rem;margin-top:8px;font-weight:500}
  .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:10px 18px;font-size:.92rem;font-weight:600;cursor:pointer;background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(40,114,229,.25);transition:transform .12s ease,background .15s ease,box-shadow .15s ease}
  .btn:hover{background:var(--accent-dark);box-shadow:0 4px 14px rgba(40,114,229,.32);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.55;cursor:default;transform:none;box-shadow:none}
  .btn-ghost{background:rgba(255,255,255,.16);color:#fff;border:1px solid rgba(255,255,255,.55);box-shadow:none;backdrop-filter:blur(2px)}
  .btn-ghost:hover{background:rgba(255,255,255,.28);box-shadow:none}
  .btn-danger{background:var(--red-soft);color:var(--red);box-shadow:none}
  .btn-danger:hover{background:#f8d2d0;box-shadow:none}
  .btn-small{padding:6px 13px;font-size:.82rem;border-radius:8px}
  .btn-link{background:none;color:var(--accent);border:none;padding:0;font-weight:600;cursor:pointer;font-size:.9rem}
  .btn-link:hover{text-decoration:underline}
  nav{background:rgba(255,255,255,.9);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
  nav .wrap{display:flex;gap:2px;overflow-x:auto}
  nav button{background:none;border:none;padding:15px 16px 13px;font-size:.93rem;white-space:nowrap;cursor:pointer;color:var(--muted);border-bottom:2.5px solid transparent;font-weight:600;transition:color .15s}
  nav button:hover{color:var(--ink)}
  nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
  main{padding:26px 20px 70px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
  .card h3{font-size:1.06rem;font-weight:700;margin-bottom:7px;letter-spacing:-.01em}
  .meta{font-size:.85rem;color:var(--muted);margin-bottom:8px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:999px;font-size:.76rem;font-weight:600;letter-spacing:.01em}
  .b-blue{background:var(--accent-soft);color:var(--accent)}
  .b-green{background:var(--green-soft);color:var(--green)}
  .b-amber{background:var(--amber-soft);color:var(--amber)}
  .b-red{background:var(--red-soft);color:var(--red)}
  .b-gray{background:#eef1f6;color:var(--muted)}
  ul.topics{margin:10px 0 0 4px;list-style:none}
  ul.topics li{position:relative;padding-left:22px;margin-bottom:6px;color:#38414f}
  ul.topics li::before{content:"";position:absolute;left:4px;top:.62em;width:6px;height:6px;border-radius:50%;background:var(--accent-light)}
  .resources{margin-top:12px;font-size:.9rem;display:flex;gap:10px;flex-wrap:wrap}
  .resources a{color:var(--accent);text-decoration:none;font-weight:600;background:var(--accent-soft);padding:5px 12px;border-radius:8px}
  .resources a:hover{background:#dbe8fc}
  .progress-outer{background:#e8ecf3;border-radius:999px;height:10px;overflow:hidden;margin-top:10px}
  .progress-inner{background:linear-gradient(90deg,var(--green),#3fbf5e);height:100%;border-radius:999px;transition:width .5s ease}
  .feedback{background:linear-gradient(180deg,#f7faff,#f3f7fe);border:1px solid #e3ecfb;border-left:3px solid var(--accent);padding:12px 15px;border-radius:0 10px 10px 0;margin-top:12px;font-size:.92rem}
  .feedback strong{color:var(--accent)}
  .empty{text-align:center;color:var(--muted);padding:48px 16px;font-size:.95rem}
  .section-title{font-size:1.32rem;font-weight:700;margin:4px 0 18px;letter-spacing:-.02em}
  .summary-card{display:flex;gap:14px;flex-wrap:wrap}
  .summary-card .stat{flex:1;min-width:130px}
  .stat .num{font-size:1.85rem;font-weight:800;color:var(--accent);letter-spacing:-.02em;line-height:1.1}
  .stat .lbl{font-size:.8rem;color:var(--muted);margin-top:2px;font-weight:500}
  footer{text-align:center;color:var(--muted);font-size:.8rem;padding:24px}
  .who{display:inline-flex;align-items:center;gap:10px}
  .avatar{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;color:#fff;font-size:.78rem;font-weight:700;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .login-box{max-width:430px;margin:56px auto}
  .login-box .card{padding:32px;box-shadow:var(--shadow-lg);border:none}
  .login-box h2{margin-bottom:6px;font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
  .login-box p.hint{color:var(--muted);font-size:.92rem;margin-bottom:20px}
  input,select,textarea{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;font-size:.95rem;font-family:inherit;background:#fff;color:var(--ink);transition:border .15s,box-shadow .15s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(40,114,229,.15)}
  textarea{resize:vertical;min-height:56px}
  .msg{font-size:.88rem;margin-top:12px;display:none}
  .msg.err{color:var(--red);display:block}
  .msg.ok{color:var(--green);display:block}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin-bottom:5px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-grid .full{grid-column:1/-1}
  .eval-row{display:grid;grid-template-columns:150px 130px 90px 1fr;gap:8px;align-items:center;padding:10px 0;border-top:1px solid var(--border);font-size:.9rem}
  .eval-row:first-of-type{border-top:none}
  .row-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:12px}
  .chip-row{display:flex;gap:8px;flex-wrap:wrap}
  .chip-row label{display:flex;gap:6px;align-items:center;font-size:.88rem;font-weight:500;color:var(--ink);background:#f5f7fb;border:1px solid var(--border);padding:6px 11px;border-radius:8px;cursor:pointer}
  .chip-row label:hover{background:#eef2f9}
  details.adder{margin-bottom:18px}
  details.adder summary{cursor:pointer;font-weight:600;color:var(--accent);padding:14px 18px;background:var(--accent-soft);border-radius:var(--radius);list-style:none;transition:background .15s}
  details.adder summary:hover{background:#dbe8fc}
  details.adder summary::-webkit-details-marker{display:none}
  details.adder[open] summary{border-radius:var(--radius) var(--radius) 0 0}
  details.adder .card{border-radius:0 0 var(--radius) var(--radius);box-shadow:none;margin-bottom:0}
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);background:#1a2233;color:#fff;padding:12px 22px;border-radius:999px;font-size:.9rem;font-weight:500;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:30;box-shadow:var(--shadow-lg)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .warn-card{background:var(--amber-soft);border-color:#f6d5b4;font-size:.9rem}
  code{background:#eef1f6;padding:2px 7px;border-radius:6px;font-size:.86em;font-family:"SF Mono",Consolas,monospace}
  .topic-edit{width:100%;min-height:92px}
  .dash-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow)}
  table.dash{width:100%;border-collapse:collapse;font-size:.9rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  table.dash th,table.dash td{text-align:left;padding:13px 16px;border-bottom:1px solid var(--border);white-space:nowrap}
  table.dash th{background:#f7f9fc;color:var(--muted);font-size:.73rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  table.dash tbody tr{transition:background .12s}
  table.dash tbody tr:hover{background:#f7faff}
  table.dash tr:last-child td{border-bottom:none}
  .mini-bar{display:inline-block;width:78px;height:8px;background:#e8ecf3;border-radius:999px;overflow:hidden;vertical-align:middle;margin-right:8px}
  .mini-bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--green),#3fbf5e)}
  .dash-cards{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .dash-cards .card{flex:1;min-width:155px;margin-bottom:0}
  .scorebars{display:flex;flex-direction:column;gap:11px;margin-top:14px}
  .scorebar-row{display:grid;grid-template-columns:160px 1fr 48px;gap:12px;align-items:center;font-size:.9rem}
  .scorebar-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .scorebar-track{height:10px;background:#e8ecf3;border-radius:999px;overflow:hidden}
  .scorebar-track > i{display:block;height:100%;border-radius:999px;transition:width .5s ease}
  .scorebar-val{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
  @media(max-width:640px){.scorebar-row{grid-template-columns:110px 1fr 42px}}
  .plan-day-head h3{font-size:1.16rem;letter-spacing:-.01em}
  .plan-sec{margin-top:16px}
  .plan-sec-title{font-weight:700;color:var(--accent-dark);font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:11px}
  .plan-topic{margin:10px 0 14px;padding-left:2px}
  .plan-topic-name{font-weight:600;color:var(--ink);margin-bottom:2px}
  .ref-tag{display:inline-block;background:var(--accent-soft);color:var(--accent);font-weight:600;font-size:.78rem;padding:4px 10px;border-radius:8px}
  input[type=checkbox],input[type=radio]{width:auto;flex-shrink:0;margin:0}
  .editbar{display:flex;align-items:center;gap:12px;position:sticky;top:52px;z-index:4}
  .edit-day-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  .edit-sec{border:1px solid var(--border);border-radius:12px;padding:14px;margin:12px 0;background:#fbfcfe}
  .edit-sec-head{display:flex;gap:8px;align-items:center;margin-bottom:10px}
  .edit-sec-head input{font-weight:600}
  .edit-topic{display:grid;grid-template-columns:1fr 1.5fr auto;gap:8px;align-items:start;margin-bottom:9px}
  .edit-topic textarea{min-height:44px}
  .mod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:9px;margin-top:4px}
  .mod-grid label{display:flex;align-items:center;gap:10px;font-size:.86rem;font-weight:500;color:var(--ink);background:#f6f8fc;border:1px solid var(--border);padding:10px 13px;border-radius:10px;cursor:pointer;line-height:1.35}
  .mod-grid label:hover{background:#eef2f9;border-color:#d4def0}
  @media(max-width:640px){.form-grid{grid-template-columns:1fr}.eval-row{grid-template-columns:1fr 1fr}.edit-topic{grid-template-columns:1fr}.editbar{position:static}header h1{font-size:1.2rem}.section-title{font-size:1.15rem}}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="brand-row">
    <svg viewBox="0 0 229.6 54.48" xmlns="http://www.w3.org/2000/svg" aria-label="SOTI" role="img"><g fill="#FFFFFF"><path d="M131 8.27C128.56 5.36 126.34 3.96 123.08 2.68 119.7 1.4 113.88 0 103.87 0 93.86 0 87.92 1.28 84.55 2.68 81.17 3.96 79.08 5.36 76.63 8.27 74.07 11.3 71.39 16.88 71.39 27.36 71.39 37.84 74.42 43.66 77.09 46.45 78.6 48.08 81.75 50.29 84.42 51.46 88.03 52.86 94.08 54.37 103.86 54.37 113.64 54.37 119.69 52.86 123.3 51.46 125.98 50.41 129.12 48.2 130.63 46.45 133.19 43.66 136.33 38.3 136.33 27.36 136.21 16.88 133.42 11.3 130.98 8.27ZM120.75 42.26C117.84 45.17 112.95 46.8 103.87 46.8 94.79 46.8 89.9 45.05 86.99 42.26 82.68 38.07 82.33 29.8 82.33 27.13 82.33 19.8 83.84 15.02 86.17 12.23 89.08 8.74 93.15 7.46 103.86 7.46 114.57 7.46 118.64 8.86 121.55 12.23 123.99 15.02 125.39 19.8 125.39 27.13 125.27 29.92 124.92 38.07 120.73 42.26Z"/><path d="M179.54 51.45C179.54 52.5 178.84 52.96 177.79 52.96L171.04 52.96C169.99 52.96 169.41 52.49 169.41 51.45L169.41 8.73C169.41 8.38 169.29 8.15 168.83 8.15L146.48 8.15C145.08 8.15 144.5 7.57 144.5 6.29L144.5 3.03C144.5 1.63 145.08 1.05 146.36 1.05L202.12 1.05C203.52 1.05 203.98 1.63 203.98 3.03L203.98 6.29C203.98 7.69 203.4 8.15 202.12 8.15L180 8.15C179.65 8.15 179.42 8.27 179.42 8.73L179.42 51.45 179.54 51.45Z"/><path d="M219.7 51.45C219.7 52.61 220.28 53.31 221.45 53.31L227.85 53.31C229.01 53.31 229.6 52.73 229.6 51.45L229.6 2.91C229.6 1.75 229.02 1.05 227.85 1.05L221.45 1.05C220.29 1.05 219.7 1.63 219.7 2.91L219.7 51.45Z"/><path d="M53.12 48.66C56.61 45.52 57.31 41.21 57.31 37.83 57.31 34.1 56.03 30.5 53.58 28.17 51.37 25.96 48.69 24.33 42.06 23.28 32.98 21.88 19.01 20.37 16.57 19.67 13.43 18.86 11.22 17.57 10.98 14.43 10.98 14.08 11.1 13.73 11.21 13.27 11.68 11.52 12.84 9.66 16.33 8.61 19.36 7.68 23.31 7.33 29.48 7.33 36.58 7.33 41.24 7.68 50.32 9.08 51.6 9.31 51.72 8.15 51.83 7.45 52.06 6.64 52.18 5.12 52.3 4.31 52.42 2.8 52.18 2.45 51.02 2.1 48.92 1.52 39.5 0 28.67 0 13.31 0 7.83 2.44 5.62 3.96 2.71 5.82 0.73     <div class="brand-sep"></div>
    <h1 id="cohort-name">Training Portal</h1>
    <div class="spacer"></div>
    <button class="btn btn-ghost" id="logout-btn" style="display:none">Log out</button>
  </div>
  <p class="sub" id="header-sub"></p>
</div></header>

<nav id="tabs" style="display:none"><div class="wrap"></div></nav>
<main class="wrap"><div id="content"><p class="empty">Loading…</p></div></main>
<div id="toast"></div>
<footer>SOTI Training Portal</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, signOut, sendPasswordResetEmail }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, deleteDoc,
  collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { FIREBASE_CONFIG, ADMIN_EMAILS } from "./firebase-config.js";

/* ---------- utilities ---------- */
const $ = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function initials(n){ const p=String(n||"").trim().split(/\s+/); return (((p[0]||"")[0]||"")+((p[1]||"")[0]||"")).toUpperCase()||"?"; }
const AV_COLORS=["#2872E5","#32B6E9","#2C9446","#E06A1E","#7C4DE0","#0E9BB0"];
function avatarHTML(name){ let h=0; const t=String(name||""); for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))>>>0; return `<span class="avatar" style="background:${AV_COLORS[h%AV_COLORS.length]}">${esc(initials(name))}</span>`; }
function scoreColor(v){ return v>=80?'var(--green)':v>=60?'var(--accent)':v>=40?'var(--amber)':'var(--red)'; }
function parseGrade(g){
  if(g==null) return null;
  const s=String(g).trim(); if(!s) return null;
  const cl=v=>Math.max(0,Math.min(100,v));
  let m=s.match(/^(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)$/);
  if(m){ const d=parseFloat(m[2]); return d>0?cl(parseFloat(m[1])/d*100):null; }
  m=s.match(/^(\d+(?:\.\d+)?)\s*%$/); if(m) return cl(parseFloat(m[1]));
  m=s.match(/^(\d+(?:\.\d+)?)$/); if(m){ let v=parseFloat(m[1]); return cl(v<=10?v*10:v); }
  const L={"a+":98,"a":93,"a-":90,"b+":88,"b":83,"b-":80,"c+":78,"c":73,"c-":70,"d+":67,"d":63,"e":50,"f":40};
  const k=s.toLowerCase(); return L[k]!=null?L[k]:null;
}
const today = () => new Date().toISOString().slice(0,10);
const fmtDate = d => d ? new Date(d+"T00:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}) : "";
function toast(m){ $("toast").textContent=m; $("toast").classList.add("show"); clearTimeout(toast._t); toast._t=setTimeout(()=>$("toast").classList.remove("show"),2800); }
function dueBadge(due,done){ if(!due) return ""; if(done) return `<span class="badge b-gray">Due ${fmtDate(due)}</span>`; return due<today()?`<span class="badge b-red">Overdue — was due ${fmtDate(due)}</span>`:`<span class="badge b-blue">Due ${fmtDate(due)}</span>`; }
function hwStatusView(ev){ if(!ev||!ev.status||ev.status==="pending") return {label:"Not submitted",cls:"b-amber",done:false}; if(ev.status==="submitted") return {label:"Submitted — awaiting review",cls:"b-blue",done:true}; if(ev.status==="graded") return {label:"Graded"+(ev.grade?": "+ev.grade:""),cls:"b-green",done:true}; return {label:ev.status,cls:"b-gray",done:false}; }
const assignedTo = (a,uid) => (a.assignedTo||[]).includes("all") || (a.assignedTo||[]).includes(uid);

/* ---------- config guard ---------- */
if (String(FIREBASE_CONFIG.apiKey||"").startsWith("PASTE")) {
  $("content").innerHTML = `<div class="card warn-card"><h3>Not configured yet</h3>
    <p>Open <code>firebase-config.js</code> and paste your Firebase project settings and instructor email, then reload. See <code>README.md</code> for step-by-step setup.</p></div>`;
  throw new Error("Firebase not configured");
}

/* ---------- init ---------- */
const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);
const isAdminEmail = email => ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(String(email||"").toLowerCase());
const PORTAL_TITLE = "Technical Support Onboarding";

/* ---------- app state ---------- */
let user = null, role = null;   // role: "admin" | "student" | "pending"
let tab = null;

/* ---------- Firestore helpers ---------- */
const metaRef = () => doc(db,"config","meta");
async function loadMeta(){ const s=await getDoc(metaRef()); store.meta = s.exists()? s.data() : null; }
async function loadCollection(name){ const q=await getDocs(collection(db,name)); return q.docs.map(d=>({id:d.id,...d.data()})); }
async function loadStudentDoc(uid){ const s=await getDoc(doc(db,"students",uid)); return s.exists()? s.data() : null; }
async function loadSub(uid,sub){ const q=await getDocs(collection(db,"students",uid,sub)); const o={}; q.docs.forEach(d=>o[d.id]=d.data()); return o; }
async function loadManagerEmails(){ try{ const m=await getDoc(doc(db,"config","managers")); store.managerEmails = m.exists()?(m.data().emails||[]):[]; }catch(e){ store.managerEmails=[]; } return store.managerEmails; }
async function isManagerEmail(email){ const list=await loadManagerEmails(); return list.map(e=>String(e).toLowerCase()).includes(String(email||"").toLowerCase()); }

/* ---------- auth screens ---------- */
function renderAuth(mode){
  mode = mode || "login";
  const login = mode==="login";
  $("tabs").style.display="none"; $("logout-btn").style.display="none";
  $("header-sub").textContent="";
  $("cohort-name").textContent=PORTAL_TITLE;
  $("content").innerHTML = `
    <div class="login-box"><div class="card">
      <h2>${login?"Sign in":"Create your account"}</h2>
      <p class="hint">${login?"Use the email and password for your training account.":"Register with your email and a password you choose. Your instructor will activate your account."}</p>
      ${login?"":`<div class="field"><label>Your full name</label><input type="text" id="au-name" placeholder="Maria Lopez"></div>`}
      <div class="field"><label>Email</label><input type="email" id="au-email" autocomplete="email" placeholder="you@example.com"></div>
      <div class="field"><label>Password</label><input type="password" id="au-pass" autocomplete="${login?"current-password":"new-password"}" placeholder="${login?"":"At least 6 characters"}"></div>
      <button class="btn" id="au-go" style="width:100%">${login?"Sign in":"Create account"}</button>
      <div class="msg" id="au-msg"></div>
      <div style="margin-top:16px;display:flex;justify-content:space-between">
        <button class="btn-link" id="au-toggle">${login?"Need an account? Register":"Have an account? Sign in"}</button>
        ${login?'<button class="btn-link" id="au-reset">Forgot password?</button>':""}
      </div>
    </div></div>`;
  const setMsg=(t,ok)=>{ const m=$("au-msg"); m.textContent=t; m.className="msg "+(ok?"ok":"err"); };
  $("au-toggle").onclick=()=>renderAuth(login?"register":"login");
  const resetBtn=$("au-reset");
  if(resetBtn) resetBtn.onclick=async()=>{ const em=$("au-email").value.trim(); if(!em){setMsg("Enter your email first, then click reset.");return;} try{await sendPasswordResetEmail(auth,em); setMsg("Password reset email sent to "+em,true);}catch(e){setMsg(friendly(e));} };
  $("au-go").onclick=async()=>{
    const email=$("au-email").value.trim(), pass=$("au-pass").value;
    if(!email||!pass){ setMsg("Email and password are required."); return; }
    $("au-go").disabled=true;
    try{
      if(login){ await signInWithEmailAndPassword(auth,email,pass); }
      else {
        const name=$("au-name").value.trim();
        if(!name){ setMsg("Please enter your name."); $("au-go").disabled=false; return; }
        const cred=await createUserWithEmailAndPassword(auth,email,pass);
        const mgr = await isManagerEmail(email).catch(()=>false);
        if(!isAdminEmail(email) && !mgr){
          await setDoc(doc(db,"students",cred.user.uid),{ name, startDate:today(), completedModules:[], status:"pending", email });
        }
      }
    }catch(e){ setMsg(friendly(e)); $("au-go").disabled=false; }
  };
  $("au-email").focus();
}
function friendly(e){
  const c=(e&&e.code)||"";
  if(c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found")) return "Email or password is incorrect.";
  if(c.includes("email-already-in-use")) return "An account with this email already exists — try signing in.";
  if(c.includes("weak-password")) return "Password should be at least 6 characters.";
  if(c.includes("invalid-email")) return "That doesn't look like a valid email.";
  if(c.includes("too-many-requests")) return "Too many attempts — wait a minute and try again.";
  return (e&&e.message)||"Something went wrong.";
}

/* ---------- data loads ---------- */
async function loadStudent(){
  await loadMeta();
  store.me = await loadStudentDoc(user.uid);
  if(!store.me){ role="pending"; return; }
  if(store.me.status!=="active"){ role="pending"; return; }
  role="student";
  store.homework = await loadCollection("homework");
  store.tasks = await loadCollection("tasks");
  store.grades = await loadSub(user.uid,"grades");
  store.taskstatus = await loadSub(user.uid,"taskstatus");
}
async function loadAdmin(){
  await loadMeta();
  planDraft=null;
  await loadManagerEmails();
  store.students = await loadCollection("students");
  const skip = new Set([...ADMIN_EMAILS, ...(store.managerEmails||[])].map(e=>String(e).toLowerCase()));
  store.students = store.students.filter(s=>!skip.has(String(s.email||"").toLowerCase()));
  store.homework = await loadCollection("homework");
  store.tasks = await loadCollection("tasks");
  store.grades = {}; store.taskstatus = {};
  for(const s of store.students){
    store.grades[s.id] = await loadSub(s.id,"grades");
    store.taskstatus[s.id] = await loadSub(s.id,"taskstatus");
  }
}
const plan = () => (store.meta&&store.meta.plan) || [];

/* ---------- student views ---------- */
function vOverview(){
  const me=store.me, completed=me.completedModules||[];
  const myHw=store.homework.filter(h=>assignedTo(h,user.uid));
  const graded=myHw.filter(h=>((store.grades[h.id]||{}).status)==="graded").length;
  const myTasks=store.tasks.filter(t=>assignedTo(t,user.uid));
  const open=myTasks.filter(t=>((store.taskstatus[t.id]||{}).status||"not-started")!=="done").length;
  const pct=plan().length?Math.round(completed.length/plan().length*100):0;
  let recent="";
  myHw.forEach(h=>{ const ev=store.grades[h.id]; if(ev&&ev.status==="graded") recent+=`<div class="feedback"><strong>${esc(h.title)}</strong> — ${esc(ev.grade||"graded")}${ev.feedback?"<br>"+esc(ev.feedback):""}</div>`; });
  return `<h2 class="section-title">Welcome, ${esc((me.name||"").split(" ")[0]||"there")}</h2>
    <div class="card summary-card">
      <div class="stat"><div class="num">${pct}%</div><div class="lbl">Plan completed</div></div>
      <div class="stat"><div class="num">${graded}/${myHw.length}</div><div class="lbl">Homework graded</div></div>
      <div class="stat"><div class="num">${open}</div><div class="lbl">Open tasks</div></div>
    </div>
    <div class="card"><h3>Training progress</h3>
      <div class="meta">${completed.length} of ${plan().length} days completed</div>
      <div class="progress-outer"><div class="progress-inner" style="width:${pct}%"></div></div></div>
    ${recent?`<div class="card"><h3>Latest feedback</h3>${recent}</div>`:""}`;
}
function planDayCard(m, completed, showBadge){
  const done=(completed||[]).includes(m.id);
  const secs=(m.sections||[]).map(sec=>`
    <div class="plan-sec"><div class="plan-sec-title">${esc(sec.content)}</div>
      ${(sec.topics||[]).map(tp=>`<div class="plan-topic"><div class="plan-topic-name">${esc(tp.t)}</div>${(tp.subs&&tp.subs.length)?`<ul class="topics">${tp.subs.map(x=>`<li>${esc(x)}</li>`).join("")}</ul>`:""}</div>`).join("")}
    </div>`).join("");
  const badge = showBadge ? (done?'<span class="badge b-green">Completed</span>':'<span class="badge b-gray">Not completed</span>') : "";
  return `<div class="card plan-day"><div class="plan-day-head"><h3>Day ${esc(m.day)} — ${esc(m.title)}</h3><div class="meta">${fmtDate(m.date)} ${badge}</div></div>${secs}</div>`;
}
function vPlan(){
  if(!plan().length) return '<p class="empty">The training plan hasn’t been set up yet.</p>';
  const completed=(store.me&&store.me.completedModules)||[];
  return `<h2 class="section-title">Training Plan</h2>`+plan().map(m=>planDayCard(m,completed,true)).join("");
}
function vManagerPlan(){
  if(!plan().length) return '<p class="empty">The training plan hasn’t been set up yet.</p>';
  return `<h2 class="section-title">Training Plan</h2>`+plan().map(m=>planDayCard(m,[],false)).join("");
}
function vHomework(){
  const mine=store.homework.filter(h=>assignedTo(h,user.uid));
  if(!mine.length) return '<p class="empty">No homework assigned yet.</p>';
  return `<h2 class="section-title">Homework</h2>`+mine.map(h=>{
    const ev=store.grades[h.id]; const st=hwStatusView(ev);
    return `<div class="card"><h3>${esc(h.title)}</h3>
      <div class="meta"><span class="badge ${st.cls}">${esc(st.label)}</span>${dueBadge(h.due,st.done)}</div>
      <p>${esc(h.description)}</p>
      ${h.submitVia?`<p class="meta" style="margin-top:8px">How to submit: ${esc(h.submitVia)}</p>`:""}
      ${ev&&ev.feedback?`<div class="feedback"><strong>Instructor feedback:</strong> ${esc(ev.feedback)}</div>`:""}</div>`;
  }).join("");
}
function vTasks(){
  const mine=store.tasks.filter(t=>assignedTo(t,user.uid));
  if(!mine.length) return '<p class="empty">No tasks assigned yet.</p>';
  const opts=["not-started","in-progress","done"];

function assigneeChecks(prefix,checked){
  return `<div class="chip-row">

    ${activeStudents().map(s=>`<label><input type="checkbox" data-role="${prefix}-as" value="${esc(s.id)}" ${checked.includes(s.id)?"checked":""}> ${esc(s.name)}</label>`).join("")}

function readAssignees(prefix){ const b=[...$("content").querySelectorAll(`input[data-role="${prefix}-as"]:checked`)].map(x=>x.value); return b.includes("all")?["all"]:b; }
const newId = coll => doc(collection(db,coll)).id;
function draft(){ if(!planDraft) planDraft = JSON.parse(JSON.stringify(plan())); return planDraft; }
function syncPlanDraft(){
  if(!planDraft) return;
  const c=$("content"), D=planDraft;
  c.querySelectorAll('[data-role="d-date"]').forEach(el=>{ if(D[+el.dataset.di]) D[+el.dataset.di].date=el.value; });

  c.querySelectorAll('[data-role="t-subs"]').forEach(el=>{ const m=D[+el.dataset.di]; if(m&&m.sections[+el.dataset.si]&&m.sections[+el.dataset.si].topics[+el.dataset.ti]) m.sections[+el.dataset.si].topics[+el.dataset.ti].subs=el.value.split("\n").map(x=>x.trim()).filter(Boolean); });
}

/* ---------- dashboard (admin + manager) ---------- */
function vDashboard(){
  if(!store.meta) return role==="manager"
    ? '<p class="empty">The portal isn’t set up yet. Please check back once your instructor has initialized it.</p>'
    : needInit();
  const P=plan().length||1;
  const studs=activeStudents();
  const pendingAct=students().filter(s=>s.status!=="active").length;
  let toReview=0, overdueTotal=0, sumPct=0, totalDoneDays=0;
  const allScores=[]; const scoreRows=[];
  const rows=studs.map(s=>{
    const doneDays=(s.completedModules||[]).length; totalDoneDays+=doneDays;
    const pct=Math.round(doneDays/P*100); sumPct+=pct;
    const g=store.grades[s.id]||{}, ts=store.taskstatus[s.id]||{};
    const myHw=store.homework.filter(h=>assignedTo(h,s.id));
    let graded=0,submitted=0,hwOverdue=0; const sc=[];
    myHw.forEach(h=>{ const ev=g[h.id]||{}; const st=ev.status||"pending";
      if(st==="graded"){ graded++; const v=parseGrade(ev.grade); if(v!=null){ sc.push(v); allScores.push(v); } }
      else if(st==="submitted"){ submitted++; toReview++; }
      else if(h.due&&h.due<today()){ hwOverdue++; } });
    const myTasks=store.tasks.filter(t=>assignedTo(t,s.id));
    let tDone=0,tOverdue=0;
    myTasks.forEach(t=>{ const st=(ts[t.id]||{}).status||"not-started"; if(st==="done")tDone++; else if(t.due&&t.due<today())tOverdue++; });
    const od=hwOverdue+tOverdue; overdueTotal+=od;
    const avgScore=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;
    scoreRows.push({name:s.name, avg:avgScore});
    const flags=[];
    if(submitted)flags.push(`<span class="badge b-blue">${submitted} to review</span>`);
    if(od)flags.push(`<span class="badge b-red">${od} overdue</span>`);
    if(!flags.length)flags.push(`<span class="badge b-green">On track</span>`);
    const scoreCell=avgScore!=null?`<strong style="color:${scoreColor(avgScore)}">${avgScore}%</strong>`:'<span style="color:var(--muted)">—</span>';
    return `<tr>
      <td><span class="who">${avatarHTML(s.name)}<strong>${esc(s.name)}</strong></span></td>
      <td><div style="display:flex;align-items:center;gap:8px;white-space:nowrap"><span class="mini-bar"><i style="width:${pct}%"></i></span><strong>${pct}%</strong><span style="color:var(--muted);font-size:.82rem">${doneDays}/${P}d</span></div></td>
      <td>${graded}/${myHw.length}</td>
      <td>${scoreCell}</td>
      <td>${tDone}/${myTasks.length}</td>
      <td>${flags.join(" ")}</td></tr>`;
  }).join("");
  const avg=studs.length?Math.round(sumPct/studs.length):0;
  const cohortScore=allScores.length?Math.round(allScores.reduce((a,b)=>a+b,0)/allScores.length):null;
  const cards=`<div class="dash-cards">
    <div class="card"><div class="stat"><div class="num">${studs.length}</div><div class="lbl">Active trainees</div></div></div>
    <div class="card"><div class="stat"><div class="num">${avg}%</div><div class="lbl">Avg plan progress</div></div></div>
    <div class="card"><div class="stat"><div class="num" style="color:${cohortScore!=null?scoreColor(cohortScore):'var(--muted)'}">${cohortScore!=null?cohortScore+"%":"—"}</div><div class="lbl">Avg homework score</div></div></div>
    <div class="card"><div class="stat"><div class="num" style="color:var(--accent)">${toReview}</div><div class="lbl">Homework to review</div></div></div>
    <div class="card"><div class="stat"><div class="num" style="color:${overdueTotal?'var(--red)':'var(--green)'}">${overdueTotal}</div><div class="lbl">Overdue items</div></div></div>
  </div>`;
  const cohortBar=`<div class="card"><h3>Technical Support Onboarding</h3>
    <div class="meta">${avg}% average across ${studs.length} trainee${studs.length===1?"":"s"} · ${totalDoneDays} of ${studs.length*P} day-completions · ${P}-day plan</div>
    <div class="progress-outer"><div class="progress-inner" style="width:${avg}%"></div></div></div>`;
  const bars=scoreRows.map(r=>{
    const v=r.avg;
    const fill=v!=null?`<i style="width:${v}%;background:${scoreColor(v)}"></i>`:"";
    const val=v!=null?`${v}%`:`<span style="color:var(--muted);font-weight:500">n/a</span>`;
    return `<div class="scorebar-row"><span class="scorebar-name">${esc(r.name)}</span><span class="scorebar-track">${fill}</span><span class="scorebar-val">${val}</span></div>`;
  }).join("");
  const hwCard=`<div class="card"><h3>Homework performance</h3>
    <div class="meta">${cohortScore!=null
      ? `Overall score <strong style="color:${scoreColor(cohortScore)}">${cohortScore}%</strong> across ${allScores.length} graded submission${allScores.length===1?"":"s"}`
      : "No homework graded yet — scores appear here once you grade submissions."}</div>
    ${cohortScore!=null?`<div class="progress-outer"><div class="progress-inner" style="width:${cohortScore}%;background:${scoreColor(cohortScore)}"></div></div>`:""}
    ${scoreRows.length?`<div class="scorebars">${bars}</div>`:""}</div>`;
  const pendNote=(role==="admin"&&pendingAct)?`<div class="card warn-card">${pendingAct} account(s) awaiting activation — see the Students tab.</div>`:"";
  const table=studs.length
    ? `<div class="dash-wrap"><table class="dash"><thead><tr><th>Trainee</th><th>Plan progress</th><th>Homework</th><th>Score</th><th>Tasks</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div>`
    : '<p class="empty">No active trainees yet.</p>';
  return `<h2 class="section-title">Progress dashboard</h2>${cards}${cohortBar}${hwCard}${pendNote}${table}`;
}

/* ---------- writes ---------- */
async function saveMeta(patch){ store.meta={...store.meta,...patch}; await setDoc(metaRef(),store.meta); }
async function refreshAdmin(){ await loadAdmin(); render(); }

/* ---------- event wiring ---------- */
function wire(){
  const c=$("content");
  // student: own task progress
  c.querySelectorAll('[data-role="my-task"]').forEach(el=>el.onchange=async()=>{
    try{ await setDoc(doc(db,"students",user.uid,"taskstatus",el.dataset.task),{status:el.value}); store.taskstatus[el.dataset.task]={status:el.value}; toast("Progress saved"); }
    catch(e){ toast("Could not save: "+friendly(e)); }
  });

  // init
  const initGo=$("init-go");
  if(initGo) initGo.onclick=async()=>{ initGo.disabled=true; try{
    await setDoc(metaRef(),{ cohortName:PORTAL_TITLE, instructor:user.email, plan:DEFAULT_PLAN });
    toast("Portal initialized"); await refreshAdmin();
  }catch(e){ toast(friendly(e)); initGo.disabled=false; } };

  // students admin
  c.querySelectorAll('[data-role="activate"]').forEach(el=>el.onclick=async()=>{ await updateDoc(doc(db,"students",el.dataset.sid),{status:"active"}); toast("Activated"); await refreshAdmin(); });
  c.querySelectorAll('[data-role="del-student"]').forEach(el=>el.onclick=async()=>{ if(!confirm("Remove "+nameOf(el.dataset.sid)+"? Their login stays but their profile/data is deleted.")) return; await deleteDoc(doc(db,"students",el.dataset.sid)); toast("Removed"); await refreshAdmin(); });
  c.querySelectorAll('[data-role="mod"]').forEach(el=>el.onchange=async()=>{
    const s=students().find(x=>x.id===el.dataset.sid); const set=new Set(s.completedModules||[]);
    el.checked?set.add(el.value):set.delete(el.value);
    s.completedModules=plan().map(m=>m.id).filter(id=>set.has(id));
    await updateDoc(doc(db,"students",s.id),{completedModules:s.completedModules}); toast("Saved");
  });

  // homework admin
  const nhAdd=$("nh-add");
  if(nhAdd) nhAdd.onclick=async()=>{ const title=$("nh-title").value.trim(); if(!title){toast("Title required");return;}
    const id=newId("homework");
    await setDoc(doc(db,"homework",id),{ title, description:$("nh-desc").value.trim(), due:$("nh-due").value||"", submitVia:$("nh-submit").value.trim(), assignedTo:readAssignees("nh") });
    toast("Homework assigned"); await refreshAdmin(); };
  const evSave=async el=>{ const uid=el.dataset.sid,hw=el.dataset.hw,field=el.dataset.role.replace("ev-","");
    const cur=(store.grades[uid]||{})[hw]||{}; cur[field]=el.value.trim?el.value.trim():el.value;
    await setDoc(doc(db,"students",uid,"grades",hw),cur); store.grades[uid]=store.grades[uid]||{}; store.grades[uid][hw]=cur; toast("Saved"); };
  c.querySelectorAll('[data-role^="ev-"]').forEach(el=>el.onchange=()=>evSave(el).catch(e=>toast(friendly(e))));
  c.querySelectorAll('[data-role="del-hw"]').forEach(el=>el.onclick=async()=>{ if(!confirm("Delete this homework?"))return; await deleteDoc(doc(db,"homework",el.dataset.hw)); toast("Deleted"); await refreshAdmin(); });

  // tasks admin
  const ntAdd=$("nt-add");
  if(ntAdd) ntAdd.onclick=async()=>{ const title=$("nt-title").value.trim(); if(!title){toast("Title required");return;}
    const id=newId("tasks");
    await setDoc(doc(db,"tasks",id),{ title, description:$("nt-desc").value.trim(), due:$("nt-due").value||"", assignedTo:readAssignees("nt") });
    toast("Task added"); await refreshAdmin(); };
  c.querySelectorAll('[data-role="task-status"]').forEach(el=>el.onchange=async()=>{ const uid=el.dataset.sid,t=el.dataset.task;
    await setDoc(doc(db,"students",uid,"taskstatus",t),{status:el.value}); store.taskstatus[uid]=store.taskstatus[uid]||{}; store.taskstatus[uid][t]={status:el.value}; toast("Saved"); });
  c.querySelectorAll('[data-role="del-task"]').forEach(el=>el.onclick=async()=>{ if(!confirm("Delete this task?"))return; await deleteDoc(doc(db,"tasks",el.dataset.task)); toast("Deleted"); await refreshAdmin(); });

  // plan editor
  const struct=(fn)=>{ syncPlanDraft(); fn(); render(); };
  const savePlanBtn=$("plan-save");
  if(savePlanBtn) savePlanBtn.onclick=async()=>{
    syncPlanDraft();
    (planDraft||[]).forEach((m,i)=>{ m.day=i+1; if(!m.id)m.id="d"+Date.now().toString(36)+i; m.sections=(m.sections||[]).filter(sec=>(sec.content||"").trim()||(sec.topics||[]).length); m.title=(m.sections||[]).map(sec=>sec.content).filter(Boolean).join(" · ")||("Day "+(i+1)); });
    savePlanBtn.disabled=true;
    try{ await saveMeta({plan:JSON.parse(JSON.stringify(planDraft))}); toast("Training plan saved — live for everyone"); render(); }
    catch(e){ toast(friendly(e)); savePlanBtn.disabled=false; }
  };
  const discardBtn=$("plan-discard");
  if(discardBtn) discardBtn.onclick=()=>{ if(!confirm("Discard unsaved edits?"))return; planDraft=null; toast("Changes discarded"); render(); };
  const loadPlan=$("load-plan");
  if(loadPlan) loadPlan.onclick=async()=>{ if(!confirm("Replace the plan with the built-in 15-day default? This discards edits and applies to everyone."))return;
    try{ await saveMeta({plan:JSON.parse(JSON.stringify(SOTI_PLAN))}); planDraft=null; toast("Loaded built-in plan"); render(); }catch(e){ toast(friendly(e)); } };
  c.querySelectorAll('[data-role="s-add"]').forEach(el=>el.onclick=()=>struct(()=>{ planDraft[+el.dataset.di].sections.push({content:"New section",topics:[{t:"New topic",subs:[]}]}); }));
  c.querySelectorAll('[data-role="s-del"]').forEach(el=>el.onclick=()=>{ if(!confirm("Remove this section?"))return; struct(()=>{ planDraft[+el.dataset.di].sections.splice(+el.dataset.si,1); }); });
  c.querySelectorAll('[data-role="t-add"]').forEach(el=>el.onclick=()=>struct(()=>{ planDraft[+el.dataset.di].sections[+el.dataset.si].topics.push({t:"New topic",subs:[]}); }));
  c.querySelectorAll('[data-role="t-del"]').forEach(el=>el.onclick=()=>struct(()=>{ planDraft[+el.dataset.di].sections[+el.dataset.si].topics.splice(+el.dataset.ti,1); }));
  c.querySelectorAll('[data-role="day-add"]').forEach(el=>el.onclick=()=>struct(()=>{ planDraft.push({id:"d"+Date.now().toString(36),date:"",sections:[{content:"New section",topics:[{t:"New topic",subs:[]}]}]}); }));
  c.querySelectorAll('[data-role="day-del"]').forEach(el=>el.onclick=()=>{ if(!confirm("Delete this entire day?"))return; struct(()=>{ planDraft.splice(+el.dataset.di,1); }); });
  c.querySelectorAll('[data-role="day-up"]').forEach(el=>el.onclick=()=>struct(()=>{ const i=+el.dataset.di; if(i>0){ const a=planDraft; const t=a[i-1]; a[i-1]=a[i]; a[i]=t; } }));
  c.querySelectorAll('[data-role="day-down"]').forEach(el=>el.onclick=()=>struct(()=>{ const i=+el.dataset.di, a=planDraft; if(i<a.length-1){ const t=a[i+1]; a[i+1]=a[i]; a[i]=t; } }));

  // managers
  const mgAdd=$("mg-add");
  if(mgAdd) mgAdd.onclick=async()=>{ const em=$("mg-email").value.trim().toLowerCase();
    if(!em||em.indexOf("@")<0){ toast("Enter a valid email"); return; }
    try{ const list=[...new Set([...(store.managerEmails||[]), em])];
      await setDoc(doc(db,"config","managers"),{emails:list}); store.managerEmails=list; toast("Manager added"); render();
    }catch(e){ toast(friendly(e)); } };
  c.querySelectorAll('[data-role="mg-del"]').forEach(el=>el.onclick=async()=>{
    const list=(store.managerEmails||[]).filter(e=>e!==el.dataset.email);
    try{ await setDoc(doc(db,"config","managers"),{emails:list}); store.managerEmails=list; toast("Removed"); render(); }
    catch(e){ toast(friendly(e)); } });
}

/* ---------- boot ---------- */
$("logout-btn").onclick=()=>signOut(auth);
onAuthStateChanged(auth, async u=>{
  user=u; tab=null; for(const k in store) delete store[k];
  if(!u){ role=null; renderAuth("login"); return; }
  $("content").innerHTML='<p class="empty">Loading…</p>';
  try{
    if(isAdminEmail(u.email)){ role="admin"; await loadAdmin(); }
    else if(await isManagerEmail(u.email)){ role="manager"; await loadAdmin(); }
    else{ await loadStudent(); }
    renderShell();
  }catch(e){
    $("content").innerHTML=`<div class="card warn-card"><h3>Couldn’t load your data</h3><p>${esc(friendly(e))}</p>
      <p class="meta">If you just set up the project, make sure Firestore is created and the security rules are published (see README).</p>
      <button class="btn" onclick="location.reload()">Reload</button></div>`;
  }
});
</script>
</body>
</html>
